<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-aurora-pink: #FFD6E5;
            --color-aurora-purple: #EAD6FF;
            --color-aurora-yellow: #FFF7D1;
            --color-aurora-mint: #D6F5FF;
            --color-base-ink: #0B1220;
        }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #FAFAFA;
        }

        /* Blob Animation for background */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }

        /* Custom Scrollbar for Modal Grid */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Map Node Animation */
        @keyframes map-node-fade {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            10% { opacity: 1; transform: scale(1) translateY(0); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
            80% { opacity: 1; transform: scale(1) translateY(0); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
            100% { opacity: 0; transform: scale(0.8) translateY(-10px); }
        }
        .map-node {
            position: absolute;
            animation: map-node-fade 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
        }
        
        /* Modal Transition */
        .modal-enter {
            opacity: 1 !important;
            pointer-events: auto !important;
            transform: translateY(0) scale(1) !important;
        }
    </style>
</head>
<body class="w-screen h-screen relative flex items-center justify-center">

    <!-- Aurora Background -->
    <div class="absolute inset-0 z-0 opacity-50 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#FFD6E5] rounded-full mix-blend-multiply filter blur-[100px] animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-[40%] h-[60%] bg-[#EAD6FF] rounded-full mix-blend-multiply filter blur-[100px] animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[60%] h-[50%] bg-[#D6F5FF] rounded-full mix-blend-multiply filter blur-[100px] animate-blob animation-delay-4000"></div>
    </div>

    <!-- World Map Background Image -->
    <div class="absolute inset-0 z-10 flex items-center justify-center opacity-20 pointer-events-none">
        <!-- Using a simplified, recognizable world map SVG -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg" alt="World Map" class="w-[85%] max-w-6xl object-contain filter grayscale" style="mask-image: linear-gradient(to bottom, black 80%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);"/>
    </div>

    <!-- Dynamic Language Nodes Container -->
    <div id="nodes-container" class="absolute inset-0 z-20 pointer-events-none overflow-hidden max-w-6xl mx-auto w-[85%] h-full flex items-center justify-center relative">
        <!-- JS injected map nodes -->
    </div>

    <!-- Central Content & Button -->
    <div class="relative z-30 flex flex-col items-center justify-center text-center px-4">
        <div class="relative mb-6">
            <div class="w-20 h-20 bg-[#0B1220] rounded-full flex items-center justify-center text-white text-xl font-bold shadow-[0_0_40px_rgba(11,18,32,0.2)]">
                EN
            </div>
            <!-- Pulsing rings -->
            <div class="absolute inset-0 border-2 border-[#0B1220] rounded-full animate-ping opacity-20" style="animation-duration: 3s;"></div>
            <div class="absolute inset-[-10px] border border-[#0B1220] rounded-full animate-ping opacity-10" style="animation-duration: 3s; animation-delay: 1s;"></div>
        </div>
        
        <h2 class="text-3xl md:text-5xl font-bold text-[#0B1220] tracking-tight mb-4 max-w-2xl">
            Connecting the world in real-time
        </h2>
        <p class="text-gray-600 mb-8 max-w-xl text-lg">
            Translating your meetings into 90+ languages continuously, breaking down geographical and linguistic barriers.
        </p>

        <!-- Trigger Button -->
        <button id="browse-btn" class="group relative px-8 py-4 bg-white/60 backdrop-blur-md border border-white rounded-full shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-1 cursor-pointer pointer-events-auto">
            <div class="absolute inset-0 bg-gradient-to-r from-[#FFD6E5]/40 via-[#EAD6FF]/40 to-[#D6F5FF]/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-full"></div>
            <span class="relative z-10 text-[#0B1220] font-semibold text-lg flex items-center gap-2">
                Browse 90 Languages
                <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
            </span>
        </button>
    </div>

    <!-- Overlay / Modal for All Languages -->
    <div id="modal" class="fixed inset-0 z-50 bg-[#100924]/95 backdrop-blur-2xl transition-all duration-500 opacity-0 pointer-events-none transform scale-105 flex flex-col pt-16 px-6 sm:px-12 pb-12">
        <div class="max-w-7xl w-full mx-auto flex-1 flex flex-col h-full">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-3xl sm:text-4xl font-bold text-white tracking-tight mb-2">Supported Languages</h2>
                    <p class="text-gray-400">Available across all platforms and captions instantly.</p>
                </div>
                <button id="close-btn" class="p-3 bg-white/10 rounded-full hover:bg-white/20 transition-colors text-white border border-white/10 cursor-pointer">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="relative mb-8 max-w-md">
                <input type="text" id="search-input" placeholder="Search languages..." class="w-full px-6 py-4 rounded-full bg-[#1A1137] text-white border border-white/10 focus:outline-none focus:border-[#EAD6FF] focus:ring-1 focus:ring-[#EAD6FF] placeholder-gray-500 transition-all shadow-inner" />
                <svg class="w-5 h-5 absolute right-6 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>

            <!-- Languages Grid matching Image 2 inspiration -->
            <div id="languages-grid" class="flex-1 overflow-y-auto pr-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 content-start custom-scrollbar pb-8">
                <!-- JS will inject language pills here -->
            </div>
        </div>
    </div>

    <script>
        const languages = [
            { code: 'AF', name: 'Afrikaans' }, { code: 'SQ', name: 'Albanian' }, { code: 'AM', name: 'Amharic' }, { code: 'AR', name: 'Arabic' }, { code: 'HY', name: 'Armenian' },
            { code: 'AZ', name: 'Azerbaijani' }, { code: 'EU', name: 'Basque' }, { code: 'BE', name: 'Belarusian' }, { code: 'BN', name: 'Bengali' }, { code: 'BS', name: 'Bosnian' },
            { code: 'BG', name: 'Bulgarian' }, { code: 'CA', name: 'Catalan' }, { code: 'CEB', name: 'Cebuano' }, { code: 'NY', name: 'Chichewa' }, { code: 'ZH', name: 'Chinese (Simp)' },
            { code: 'TW', name: 'Chinese (Trad)' }, { code: 'CO', name: 'Corsican' }, { code: 'HR', name: 'Croatian' }, { code: 'CS', name: 'Czech' }, { code: 'DA', name: 'Danish' },
            { code: 'NL', name: 'Dutch' }, { code: 'EN', name: 'English' }, { code: 'EO', name: 'Esperanto' }, { code: 'ET', name: 'Estonian' }, { code: 'TL', name: 'Filipino' },
            { code: 'FI', name: 'Finnish' }, { code: 'FR', name: 'French' }, { code: 'FY', name: 'Frisian' }, { code: 'GL', name: 'Galician' }, { code: 'KA', name: 'Georgian' },
            { code: 'DE', name: 'German' }, { code: 'EL', name: 'Greek' }, { code: 'GU', name: 'Gujarati' }, { code: 'HT', name: 'Haitian Creole' }, { code: 'HA', name: 'Hausa' },
            { code: 'HW', name: 'Hawaiian' }, { code: 'IW', name: 'Hebrew' }, { code: 'HI', name: 'Hindi' }, { code: 'HM', name: 'Hmong' }, { code: 'HU', name: 'Hungarian' },
            { code: 'IS', name: 'Icelandic' }, { code: 'IG', name: 'Igbo' }, { code: 'ID', name: 'Indonesian' }, { code: 'GA', name: 'Irish' }, { code: 'IT', name: 'Italian' },
            { code: 'JA', name: 'Japanese' }, { code: 'JW', name: 'Javanese' }, { code: 'KN', name: 'Kannada' }, { code: 'KK', name: 'Kazakh' }, { code: 'KM', name: 'Khmer' },
            { code: 'RW', name: 'Kinyarwanda' }, { code: 'KO', name: 'Korean' }, { code: 'KU', name: 'Kurdish' }, { code: 'KY', name: 'Kyrgyz' }, { code: 'LO', name: 'Lao' },
            { code: 'LA', name: 'Latin' }, { code: 'LV', name: 'Latvian' }, { code: 'LT', name: 'Lithuanian' }, { code: 'LB', name: 'Luxembourgish' }, { code: 'MK', name: 'Macedonian' },
            { code: 'MG', name: 'Malagasy' }, { code: 'MS', name: 'Malay' }, { code: 'ML', name: 'Malayalam' }, { code: 'MT', name: 'Maltese' }, { code: 'MI', name: 'Maori' },
            { code: 'MR', name: 'Marathi' }, { code: 'MN', name: 'Mongolian' }, { code: 'MY', name: 'Myanmar' }, { code: 'NE', name: 'Nepali' }, { code: 'NO', name: 'Norwegian' },
            { code: 'OR', name: 'Odia' }, { code: 'PS', name: 'Pashto' }, { code: 'FA', name: 'Persian' }, { code: 'PL', name: 'Polish' }, { code: 'PT', name: 'Portuguese' },
            { code: 'PA', name: 'Punjabi' }, { code: 'RO', name: 'Romanian' }, { code: 'RU', name: 'Russian' }, { code: 'SM', name: 'Samoan' }, { code: 'GD', name: 'Scots Gaelic' },
            { code: 'SR', name: 'Serbian' }, { code: 'ST', name: 'Sesotho' }, { code: 'SN', name: 'Shona' }, { code: 'SD', name: 'Sindhi' }, { code: 'SI', name: 'Sinhala' },
            { code: 'SK', name: 'Slovak' }, { code: 'SL', name: 'Slovenian' }, { code: 'SO', name: 'Somali' }, { code: 'ES', name: 'Spanish' }, { code: 'SU', name: 'Sundanese' },
            { code: 'SW', name: 'Swahili' }, { code: 'SV', name: 'Swedish' }, { code: 'TG', name: 'Tajik' }, { code: 'TA', name: 'Tamil' }, { code: 'TT', name: 'Tatar' },
            { code: 'TE', name: 'Telugu' }, { code: 'TH', name: 'Thai' }, { code: 'TR', name: 'Turkish' }, { code: 'TK', name: 'Turkmen' }, { code: 'UK', name: 'Ukrainian' },
            { code: 'UR', name: 'Urdu' }, { code: 'UG', name: 'Uyghur' }, { code: 'UZ', name: 'Uzbek' }, { code: 'VI', name: 'Vietnamese' }, { code: 'CY', name: 'Welsh' },
            { code: 'XH', name: 'Xhosa' }, { code: 'YI', name: 'Yiddish' }, { code: 'YO', name: 'Yoruba' }, { code: 'ZU', name: 'Zulu' }
        ];

        // 1. Populate Modal Grid
        const grid = document.getElementById('languages-grid');
        
        function renderGrid(filterText = '') {
            grid.innerHTML = '';
            const filtered = languages.filter(l => l.name.toLowerCase().includes(filterText.toLowerCase()));
            
            filtered.forEach(lang => {
                const el = document.createElement('div');
                el.className = 'flex items-center gap-3 px-4 py-2.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/5 text-white transition-all cursor-pointer group select-none hover:shadow-[0_0_15px_rgba(255,255,255,0.05)]';
                el.innerHTML = `
                    <div class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold bg-gradient-to-br from-[#EAD6FF] to-[#D6F5FF] text-[#0B1220] shadow-sm group-hover:scale-110 transition-transform flex-shrink-0">
                        ${lang.code.substring(0, 2).toUpperCase()}
                    </div>
                    <span class="font-medium text-sm tracking-wide truncate w-full" title="${lang.name}">${lang.name}</span>
                `;
                grid.appendChild(el);
            });
        }
        
        renderGrid();

        // 2. Search Functionality
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('input', (e) => {
            renderGrid(e.target.value);
        });

        // 3. Modal Toggle Logic
        const modal = document.getElementById('modal');
        const browseBtn = document.getElementById('browse-btn');
        const closeBtn = document.getElementById('close-btn');

        function openModal() {
            modal.classList.add('modal-enter');
            document.body.style.overflow = 'hidden'; // prevent background scrolling
        }

        function closeModal() {
            modal.classList.remove('modal-enter');
            document.body.style.overflow = 'auto';
        }

        browseBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);
        
        // Close on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('modal-enter')) {
                closeModal();
            }
        });

        // 4. Map Node Animation Logic
        const nodesContainer = document.getElementById('nodes-container');
        const mapColors = ['#FFD6E5', '#EAD6FF', '#FFF7D1', '#D6F5FF'];
        
        function createRandomMapNode() {
            const lang = languages[Math.floor(Math.random() * languages.length)];
            const color = mapColors[Math.floor(Math.random() * mapColors.length)];
            
            const el = document.createElement('div');
            el.className = 'map-node flex items-center gap-2 px-3 py-1.5 rounded-full border border-gray-100 shadow-sm z-20';
            
            // Random position within the map bounding box area roughly
            const topPos = 20 + Math.random() * 60; // 20% to 80%
            const leftPos = 10 + Math.random() * 80; // 10% to 90%
            
            el.style.top = topPos + '%';
            el.style.left = leftPos + '%';
            
            el.innerHTML = `
                <div class="w-2 h-2 rounded-full" style="background-color: ${color};"></div>
                <span class="text-xs font-semibold text-gray-800 tracking-wide uppercase">${lang.name}</span>
            `;
            
            nodesContainer.appendChild(el);
            
            // Remove element after animation completes (4s)
            setTimeout(() => {
                if (el.parentNode) el.parentNode.removeChild(el);
            }, 4000);
        }

        // Spawn a new node periodically
        setInterval(createRandomMapNode, 800);
        
        // Initial spawn
        for(let i=0; i<3; i++) {
            setTimeout(createRandomMapNode, i * 400);
        }
    </script>
</body>
</html>
