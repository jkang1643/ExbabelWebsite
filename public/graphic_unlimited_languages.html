<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-aurora-pink: #FFD6E5;
            --color-aurora-purple: #EAD6FF;
            --color-aurora-yellow: #FFF7D1;
            --color-aurora-mint: #D6F5FF;
            --color-base-white: #FFFFFF;
            --color-base-paper: #F8F9FA;
            --color-base-ink: #0B1220;
        }
        body {
            background-color: var(--color-base-white);
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Sora', 'Inter', sans-serif;
        }
        .aurora-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
              radial-gradient(circle at 20% 10%, rgba(255, 214, 229, 0.18), transparent 55%),
              radial-gradient(circle at 75% 35%, rgba(234, 214, 255, 0.18), transparent 60%),
              radial-gradient(circle at 60% 85%, rgba(214, 245, 255, 0.16), transparent 60%);
            z-index: -1;
        }
        .orb-center {
            width: 120px;
            height: 120px;
            background: var(--color-base-ink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            box-shadow: 0 0 40px rgba(11, 18, 32, 0.2);
            position: relative;
            z-index: 10;
        }
        .orb-lang {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            color: var(--color-base-ink);
            box-shadow: 0 12px 45px rgba(234, 214, 255, 0.22);
            animation: float 6s ease-in-out infinite alternate;
        }
        .lang-es { background: var(--color-aurora-pink); top: 15%; left: 20%; animation-delay: 0s; }
        .lang-ko { background: var(--color-aurora-mint); top: 20%; right: 20%; animation-delay: -1s; }
        .lang-pt { background: var(--color-aurora-purple); bottom: 15%; left: 30%; animation-delay: -2s; }
        .lang-fr { background: var(--color-aurora-yellow); bottom: 20%; right: 30%; animation-delay: -3s; }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); box-shadow: 0 12px 45px rgba(234, 214, 255, 0.22); }
            100% { transform: translateY(-20px) scale(1.05); box-shadow: 0 30px 110px rgba(214, 245, 255, 0.3); }
        }
        
        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--color-base-ink);
            animation: pulse 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            opacity: 0;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="aurora-bg"></div>
    <div class="relative w-full h-full flex items-center justify-center">
        <div class="orb-lang lang-es">ES</div>
        <div class="orb-lang lang-ko">KO</div>
        <div class="orb-lang lang-pt">PT</div>
        <div class="orb-lang lang-fr">FR</div>
        
        <div class="orb-center">
            <div class="pulse-ring"></div>
            EN
        </div>
    </div>
</body>
</html>
