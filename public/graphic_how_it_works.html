<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-aurora-pink: #FFD6E5;
            --color-aurora-purple: #EAD6FF;
            --color-aurora-mint: #D6F5FF;
            --color-base-ink: #0B1220;
        }
        body { 
            background-color: #F8F9FA; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Sora', 'Inter', sans-serif; 
        }
        .aurora-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
              radial-gradient(circle at 30% 50%, rgba(255, 214, 229, 0.2), transparent 40%),
              radial-gradient(circle at 70% 50%, rgba(214, 245, 255, 0.2), transparent 40%);
            z-index: -1;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 12px 45px rgba(234, 214, 255, 0.22);
            border: 1px solid rgba(234, 214, 255, 0.28);
            position: relative;
            z-index: 10;
        }
        .ai-core {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--color-aurora-purple), var(--color-aurora-mint));
            border-radius: 18px;
            animation: pulse-core 2s infinite alternate;
        }
        @keyframes pulse-core {
            0% { box-shadow: 0 0 20px rgba(234, 214, 255, 0.4); transform: scale(1); }
            100% { box-shadow: 0 0 60px rgba(214, 245, 255, 0.8); transform: scale(1.05); }
        }
        .line {
            height: 2px; width: 60px;
            background: var(--color-base-ink);
            opacity: 0.2;
            position: relative;
            overflow: hidden;
        }
        .line::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--color-base-ink), transparent);
            animation: flow 1.5s infinite linear;
        }
        @keyframes flow {
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="aurora-bg"></div>
    <div class="flex items-center gap-4">
        <div class="card flex flex-col items-center">
            <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            <span class="font-medium text-sm text-gray-800">Speaker</span>
        </div>
        <div class="line"></div>
        <div class="card flex flex-col items-center p-4">
            <div class="ai-core flex items-center justify-center">
                <span class="font-bold text-gray-800 text-xl">AI</span>
            </div>
            <span class="font-medium text-sm mt-3 text-gray-800">Exbabel Engine</span>
        </div>
        <div class="line"></div>
        <div class="flex flex-col gap-3">
            <div class="card p-3 text-sm font-medium text-gray-800 border-l-4" style="border-left-color: var(--color-aurora-pink);">Spanish Stream</div>
            <div class="card p-3 text-sm font-medium text-gray-800 border-l-4" style="border-left-color: var(--color-aurora-mint);">Korean Stream</div>
        </div>
    </div>
</body>
</html>
